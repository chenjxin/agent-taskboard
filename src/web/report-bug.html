<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>提交 Bug · Agent Task Board</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #14171a;
    --panel: #1c2126;
    --panel-2: #232930;
    --border: #2e3640;
    --text: #d8dee5;
    --dim: #8b95a0;
    --accent: #58a6ff;
    --amber-bg: #3c2f12; --amber-fg: #e3b341; --amber-bd: #6b5618;
    --red-bg: #3a1f1d;   --red-fg: #f0857a;   --red-bd: #6e3631;
    --green-bg: #1b3022; --green-fg: #6fcf8e; --green-bd: #2e5c3d;
    --mod-bg: #25223a;   --mod-fg: #b3a6f5;   --mod-bd: #443d6e;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      color-scheme: light;
      --bg: #f4f5f7; --panel: #ffffff; --panel-2: #eef0f3; --border: #d4d9de;
      --text: #22272c; --dim: #66707a; --accent: #0969da;
      --amber-bg: #fff3cd; --amber-fg: #7a5d00; --amber-bd: #e3cb6e;
      --red-bg: #ffe5e2;   --red-fg: #a13327;   --red-bd: #e7a9a1;
      --green-bg: #dcf2e3; --green-fg: #1a6b38; --green-bd: #a4d4b4;
      --mod-bg: #e9e5fb;   --mod-fg: #4f3fa8;   --mod-bd: #c4baee;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI",
      "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
  }
  header {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 14px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 1;
  }
  h1 { font-size: 18px; margin: 0; }
  .back-link { color: var(--accent); text-decoration: none; font-size: 13px; margin-left: auto; }
  .back-link:hover { text-decoration: underline; }
  main { padding: 16px 20px 48px; max-width: 680px; margin: 0 auto; }
  form {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; display: flex; flex-direction: column; gap: 14px;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field[hidden] { display: none; } /* author display:flex would override the [hidden] UA rule */
  label { font-size: 13px; font-weight: 600; }
  .required::after { content: ' *'; color: var(--red-fg); }
  .batch-toggle label { font-weight: 400; display: flex; gap: 6px; align-items: center; cursor: pointer; }
  .batch-toggle input { width: auto; }
  .hint { font-size: 12px; color: var(--dim); }
  input, select, textarea {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; font: inherit; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  textarea { min-height: 120px; resize: vertical; }
  textarea.short { min-height: 56px; }
  button[type="submit"] {
    align-self: flex-end; font: inherit; font-weight: 600; cursor: pointer;
    padding: 7px 18px; border-radius: 6px;
    color: var(--green-fg); border: 1px solid var(--green-bd); background: var(--green-bg);
  }
  button[type="submit"]:disabled { opacity: 0.6; cursor: wait; }
  #result { border-radius: 6px; padding: 8px 12px; font-size: 13px; overflow-wrap: anywhere; }
  #result.ok { background: var(--green-bg); color: var(--green-fg); border: 1px solid var(--green-bd); }
  #result.err { background: var(--red-bg); color: var(--red-fg); border: 1px solid var(--red-bd); }
</style>
</head>
<body>
<header>
  <h1>提交 Bug</h1>
  <a class="back-link" href="/board">← 返回看板</a>
</header>
<main>
<form id="bug-form">
  <div class="field">
    <label class="required" for="f-name">你的姓名</label>
    <input id="f-name" name="name" type="text" required maxlength="50" pattern="[\w.-]+" autocomplete="name">
    <span class="hint">只填人名，系统会记录为 &lt;姓名&gt;/human</span>
  </div>
  <div class="field">
    <label class="required" for="f-project">项目</label>
    <select id="f-project" name="project" required></select>
    <span class="hint">从看板上的项目里选</span>
  </div>
  <div class="field">
    <label for="f-module">功能模块</label>
    <select id="f-module" name="module">
      <option value="" selected>(不确定 / 整体)</option>
    </select>
    <span class="hint">选了模块,bug 会自动出现在该模块开发者眼前;不确定就留默认</span>
  </div>
  <div class="field batch-toggle">
    <label><input id="f-batch" type="checkbox"> 批量模式(同一模块很多 bug 时:一行一条,格式「标题 | 复现步骤」,步骤可省)</label>
  </div>
  <div class="field" id="batch-field" hidden>
    <label class="required" for="f-batch-lines">批量清单</label>
    <textarea id="f-batch-lines" maxlength="200000"
      placeholder="三种来源任选:&#10;1. Excel 里选中区域直接复制粘贴到这里(列序:标题 复现步骤 期望 实际 严重程度,后四列可省)&#10;2. 下方「导入 CSV」选文件&#10;3. 手写:标题 | 复现步骤"></textarea>
    <span class="hint">每行一条 bug。Excel 粘贴/CSV 列序:标题、复现步骤、期望表现、实际表现、严重程度(critical/high/medium/low 或 阻断/严重/一般/轻微,省略用上方下拉值);自带表头行会被自动跳过;项目/模块沿用上方选择,逐条顺序提交。</span>
    <input id="f-import" type="file" accept=".csv,.tsv,.txt">
    <span class="hint">导入只是读入预览到上面的框里,检查无误后再点提交;中文 Excel 导出的 GBK 编码 CSV 可直接选</span>
  </div>
  <div class="field">
    <label class="required" for="f-title">标题</label>
    <input id="f-title" name="title" type="text" required maxlength="200">
    <span class="hint">一句话说清现象</span>
  </div>
  <div class="field">
    <label for="f-severity">严重程度</label>
    <select id="f-severity" name="severity">
      <option value="critical">critical 阻断</option>
      <option value="high">high 严重</option>
      <option value="medium" selected>medium 一般</option>
      <option value="low">low 轻微</option>
    </select>
  </div>
  <div class="field">
    <label class="required" for="f-description">复现步骤</label>
    <textarea id="f-description" name="description" required maxlength="4000"
      placeholder="1. 打开 …&#10;2. 点击 …&#10;3. …"></textarea>
  </div>
  <div class="field">
    <label for="f-expected">期望表现</label>
    <textarea id="f-expected" name="expected" class="short" maxlength="2000"
      placeholder="应该发生什么(选填)"></textarea>
  </div>
  <div class="field">
    <label for="f-actual">实际表现</label>
    <textarea id="f-actual" name="actual" class="short" maxlength="2000"
      placeholder="实际发生了什么,有报错贴报错(选填)"></textarea>
  </div>
  <div id="result" hidden></div>
  <button type="submit" id="f-submit">提交</button>
</form>
</main>
<script>
'use strict';
// XSS hard rule: every piece of server data is rendered exclusively through
// textContent. This file contains zero direct-HTML sinks (inner/outer HTML,
// adjacent-HTML insertion). Query params are never read or reflected.
//
// SUBMISSION CONTRACT: this form MUST be submitted via fetch with a JSON body
// (Content-Type: application/json) — the server rejects form-encoded bodies.
// Never convert this to a native form submit; the submit handler below calls
// event.preventDefault() unconditionally.

const NAME_KEY = 'board-reporter-name';

const $form = document.getElementById('bug-form');
const $name = document.getElementById('f-name');
const $project = document.getElementById('f-project');
const $module = document.getElementById('f-module');
const $title = document.getElementById('f-title');
const $severity = document.getElementById('f-severity');
const $description = document.getElementById('f-description');
const $expected = document.getElementById('f-expected');
const $actual = document.getElementById('f-actual');
const $submit = document.getElementById('f-submit');
const $result = document.getElementById('result');

const remembered = localStorage.getItem(NAME_KEY);
if (remembered) $name.value = remembered;

// Batch mode: one line per bug, same project/module/severity for the whole list.
const $batch = document.getElementById('f-batch');
const $batchField = document.getElementById('batch-field');
const $batchLines = document.getElementById('f-batch-lines');
const $singleFields = [$title, $description, $expected, $actual];

// Minimal RFC4180 CSV: quoted fields may contain commas/newlines/escaped quotes.
function parseCsv(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; } else inQuotes = false;
      } else field += ch;
    } else if (ch === '"') inQuotes = true;
    else if (ch === ',') { row.push(field); field = ''; }
    else if (ch === '\n' || ch === '\r') {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      row.push(field); field = '';
      if (row.some((c) => c.trim() !== '')) rows.push(row);
      row = [];
    } else field += ch;
  }
  row.push(field);
  if (row.some((c) => c.trim() !== '')) rows.push(row);
  return rows;
}

const $import = document.getElementById('f-import');
$import.addEventListener('change', async () => {
  const file = $import.files && $import.files[0];
  if (!file) return;
  try {
    const buf = await file.arrayBuffer();
    let text;
    try {
      text = new TextDecoder('utf-8', { fatal: true }).decode(buf);
    } catch (_notUtf8) {
      text = new TextDecoder('gbk').decode(buf); // 中文 Excel 导出的 CSV 默认 GBK
    }
    const isTsv = text.slice(0, 2000).includes('\t');
    const rows = isTsv
      ? text.split(/\r?\n/).map((l) => l.split('\t'))
      : parseCsv(text);
    const lines = rows
      .map((r) => r.map((c) => c.trim().replace(/\t/g, ' ')).join('\t'))
      .filter((l) => l.replace(/\t/g, '').trim() !== '');
    if (lines.length === 0) { showResult('err', '文件里没有可识别的行'); return; }
    $batchLines.value = lines.join('\n');
    showResult('ok', '已读入 ' + lines.length + ' 行(含表头会自动跳过)。请检查上面的预览,确认后点提交。');
  } catch (err) {
    showResult('err', '文件读取失败: ' + (err instanceof Error ? err.message : String(err)));
  } finally {
    $import.value = '';
  }
});

$batch.addEventListener('change', () => {
  const on = $batch.checked;
  $batchField.hidden = !on;
  for (const f of $singleFields) {
    f.closest('.field').hidden = on;
    f.required = !on && (f === $title || f === $description);
  }
  $batchLines.required = on;
});

async function postBug(payload) {
  const res = await fetch('/api/bugs', {
    method: 'POST',
    headers: { 'content-type': 'application/json', accept: 'application/json' },
    body: JSON.stringify(payload),
  });
  let body = null;
  try { body = await res.json(); } catch (_ignored) { /* keep null */ }
  return { ok: res.ok, status: res.status, body };
}

function basePayload(name) {
  return {
    name: name,
    project: document.getElementById('f-project').value.trim(),
    module: $module.value,
    severity: $severity.value,
  };
}

const SEVERITY_ALIASES = {
  critical: 'critical', high: 'high', medium: 'medium', low: 'low',
  '阻断': 'critical', '严重': 'high', '一般': 'medium', '轻微': 'low',
};
const HEADER_WORDS = ['标题', 'title', '复现', 'steps', '严重', 'severity'];

// One batch line -> bug fields. Columns: 标题/复现步骤/期望/实际/严重程度.
// Tab-separated (Excel paste & CSV import) preferred; '|' as the hand-typed form.
function parseBatchLine(line) {
  const cols = (line.includes('\t') ? line.split('\t') : line.split('|')).map((c) => c.trim());
  const sev = SEVERITY_ALIASES[(cols[4] || '').toLowerCase()] || SEVERITY_ALIASES[cols[4] || ''];
  return {
    title: (cols[0] || '').slice(0, 200),
    description: cols[1] || '(批量提交)',
    expected: cols[2] || '',
    actual: cols[3] || '',
    severity: sev || null,
  };
}

function looksLikeHeader(line) {
  const first = line.toLowerCase();
  return HEADER_WORDS.filter((w) => first.includes(w)).length >= 2;
}

async function submitBatch(name) {
  let lines = $batchLines.value.split('\n').map((l) => l.trim()).filter((l) => l.length > 0);
  if (lines.length > 0 && looksLikeHeader(lines[0])) lines = lines.slice(1);
  if (lines.length === 0) { showResult('err', '批量清单是空的'); return; }
  const okIds = [];
  const failed = [];
  for (let i = 0; i < lines.length; i++) {
    const parsed = parseBatchLine(lines[i]);
    if (!parsed.title) { failed.push('第' + (i + 1) + '行: 标题为空,跳过'); continue; }
    showResult('ok', '提交中 ' + (i + 1) + '/' + lines.length + ' …');
    const payload = Object.assign(basePayload(name), {
      title: parsed.title,
      description: parsed.description,
      expected: parsed.expected,
      actual: parsed.actual,
    });
    if (parsed.severity) payload.severity = parsed.severity; // per-row column wins over the dropdown
    const r = await postBug(payload);
    if (r.ok && r.body && typeof r.body.task_id === 'string') {
      okIds.push(r.body.task_id);
    } else if (r.status === 429) {
      failed.push('第' + (i + 1) + '行起被限流(每分钟 30 条),剩余 ' + (lines.length - i) + ' 条请稍等一分钟后重新提交');
      break;
    } else {
      failed.push('第' + (i + 1) + '行: ' + ((r.body && r.body.message) || ('HTTP ' + r.status)));
    }
  }
  if (failed.length === 0) {
    showResult('ok', '批量提交完成,共 ' + okIds.length + ' 条: ' + okIds.join(', '));
    $batchLines.value = '';
  } else {
    showResult('err', '成功 ' + okIds.length + ' 条' + (okIds.length ? '(' + okIds.join(', ') + ')' : '') + ';' + failed.join(';'));
  }
}

// Project/module dropdowns from the board's real vocabulary (/api/report-meta).
// All option text goes through textContent — never markup.
let metaProjects = [];

function fillSelect(select, items, makeOption) {
  select.replaceChildren();
  for (const item of items) select.appendChild(makeOption(item));
}

function refreshModules() {
  const entry = metaProjects.find((p) => p.project === $project.value);
  const none = document.createElement('option');
  none.value = '';
  none.textContent = '(不确定 / 整体)';
  $module.replaceChildren(none);
  for (const m of (entry ? entry.modules : [])) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    $module.appendChild(opt);
  }
}

async function loadMeta() {
  try {
    const res = await fetch('/api/report-meta', { headers: { accept: 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const body = await res.json();
    metaProjects = Array.isArray(body.projects) ? body.projects : [];
  } catch (_ignored) {
    metaProjects = [];
  }
  if (metaProjects.length > 0) {
    fillSelect($project, metaProjects, (p) => {
      const opt = document.createElement('option');
      opt.value = p.project;
      opt.textContent = p.project;
      return opt;
    });
  } else {
    // Board unreachable or empty: degrade the select into a free-text input.
    const input = document.createElement('input');
    input.id = 'f-project';
    input.name = 'project';
    input.type = 'text';
    input.required = true;
    $project.replaceWith(input);
  }
  refreshModules();
}

$project.addEventListener('change', refreshModules);
loadMeta();

function showResult(kind, text) {
  $result.hidden = false;
  $result.className = kind; // 'ok' | 'err' — fixed literals only, never raw data
  $result.textContent = text;
}

$form.addEventListener('submit', async (event) => {
  event.preventDefault(); // never a native form submit — see contract comment above
  $submit.disabled = true;
  $result.hidden = true;
  try {
    const name = $name.value.trim();
    localStorage.setItem(NAME_KEY, name);
    if ($batch.checked) {
      await submitBatch(name);
      return;
    }
    const r = await postBug(Object.assign(basePayload(name), {
      title: $title.value.trim(),
      description: $description.value.trim(),
      expected: $expected.value.trim(),
      actual: $actual.value.trim(),
    }));
    if (r.ok) {
      const taskId = r.body && typeof r.body.task_id === 'string' ? r.body.task_id : '';
      showResult('ok', '已提交' + (taskId ? '，bug 编号 ' + taskId : '') + '，继续报下一条(项目/模块/严重程度已保留)');
      // Deliberately NOT form.reset(): same-module bug streaks are the common
      // case — keep project/module/severity, clear only the per-bug fields.
      $title.value = '';
      $description.value = '';
      $expected.value = '';
      $actual.value = '';
      $title.focus();
    } else {
      showResult('err', '提交失败: ' + ((r.body && typeof r.body.message === 'string') ? r.body.message : 'HTTP ' + r.status));
    }
  } catch (err) {
    showResult('err', '提交失败: ' + (err instanceof Error ? err.message : String(err)));
  } finally {
    $submit.disabled = false;
  }
});
</script>
</body>
</html>
